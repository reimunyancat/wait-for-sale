<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
 <!-- Background -->
 <rect width="200" height="200" rx="40" fill="#04070f"/>

 <!-- Glow background -->
 <radialGradient id="glow" cx="50%" cy="50%" r="50%">
 <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.08"/>
 <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
 </radialGradient>
 <rect width="200" height="200" rx="40" fill="url(#glow)"/>

 <!-- Constellation edges -->
 <!-- 0-1 -->
 <line x1="50" y1="62" x2="112" y2="44" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35"/>
 <!-- 1-2 -->
 <line x1="112" y1="44" x2="156" y2="88" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35"/>
 <!-- 2-3 -->
 <line x1="156" y1="88" x2="138" y2="138" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35"/>
 <!-- 3-4 -->
 <line x1="138" y1="138" x2="75" y2="150" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35"/>
 <!-- 4-5 -->
 <line x1="75" y1="150" x2="38" y2="118" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35"/>
 <!-- 5-0 -->
 <line x1="38" y1="118" x2="50" y2="62" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.35"/>
 <!-- cross 0-2 -->
 <line x1="50" y1="62" x2="156" y2="88" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.18"/>
 <!-- cross 1-4 -->
 <line x1="112" y1="44" x2="75" y2="150" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.18"/>

 <!-- Stars (main) -->
 <circle cx="50" cy="62" r="7" fill="#38bdf8"/>
 <circle cx="156" cy="88" r="7" fill="#38bdf8"/>
 <circle cx="75" cy="150" r="7" fill="#38bdf8"/>

 <!-- Stars (secondary) -->
 <circle cx="112" cy="44" r="5" fill="#38bdf8" fill-opacity="0.65"/>
 <circle cx="138" cy="138" r="5" fill="#38bdf8" fill-opacity="0.65"/>
 <circle cx="38" cy="118" r="4" fill="#38bdf8" fill-opacity="0.5"/>
</svg>
